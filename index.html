<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什麼？大轉盤</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f7f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            padding: 20px;
        }

        h2 { color: #333; }

        /* 控制區 */
        .controls {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 150px;
        }

        button {
            padding: 8px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #ee5253; }

        /* 轉盤容器 */
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
        }

        /* 指針 */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #333;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            height: 30px;
        }
    </style>
</head>
<body>

    <h2>🍴 今天吃什麼？</h2>

    <div class="controls">
        <div id="input-group">
            <input type="text" class="option-input" value="拉麵">
            <input type="text" class="option-input" value="滷肉飯">
            <input type="text" class="option-input" value="麥當勞">
            <input type="text" class="option-input" value="義大利麵">
        </div>
        <p style="font-size: 0.8rem; color: #666;">(請填入 3-5 個選項)</p>
        <button onclick="updateWheel()">更新轉盤</button>
        <button onclick="spinWheel()" id="spin-btn" style="background-color: var(--secondary-color);">開始抽籤！</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="350" height="350"></canvas>
    </div>

    <div class="result" id="resultDisplay"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDisplay = document.getElementById('resultDisplay');
        let options = [];
        let currentRotation = 0;
        let isSpinning = false;

        const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCB77', '#4D96FF'];

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            options.forEach((text, i) => {
                const angle = i * arcSize;
                
                // 畫扇形
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(175, 175);
                ctx.arc(175, 175, 175, angle, angle + arcSize);
                ctx.fill();
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.translate(175, 175);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(text, 160, 10);
                ctx.restore();
            });
        }

        function updateWheel() {
            const inputs = document.querySelectorAll('.option-input');
            const newOptions = [];
            inputs.forEach(input => {
                if (input.value.trim() !== "") {
                    newOptions.push(input.value.trim());
                }
            });

            if (newOptions.length < 3 || newOptions.length > 5) {
                alert("請輸入 3 到 5 個選項喔！");
                return;
            }

            options = newOptions;
            resultDisplay.innerText = "";
            canvas.style.transform = `rotate(0deg)`;
            currentRotation = 0;
            drawWheel();
        }

        function spinWheel() {
            if (isSpinning) return;
            if (options.length === 0) updateWheel();

            isSpinning = true;
            resultDisplay.innerText = "旋轉中...";
            
            // 隨機旋轉圈數 (至少 5 圈) + 隨機角度
            const extraDegree = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + extraDegree; 
            currentRotation += totalSpin;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // 計算結果
            setTimeout(() => {
                isSpinning = false;
                const actualDeg = currentRotation % 360;
                const arcSize = 360 / options.length;
                
                // 指針在上方(270度)，計算落在哪個區塊
                // 轉盤順時針轉，所以要用 360 減去角度
                const index = Math.floor(((360 - (actualDeg % 360) + 270) % 360) / arcSize);
                resultDisplay.innerText = `🎉 今天就吃：${options[index]}！`;
            }, 4000);
        }

        // 初始化
        updateWheel();
    </script>
</body>
</html>
